components:
  composable-operations:
    stepConfig:
      install-core-provider:
        helmValues:
          cdc:
            image:
              repository: kind.local/composition-dynamic-controller
              tag: latest
              pullPolicy: IfNotPresent
            env:
              OTEL_ENABLED: "true"
              OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318"
              OTEL_EXPORT_INTERVAL: "30s"