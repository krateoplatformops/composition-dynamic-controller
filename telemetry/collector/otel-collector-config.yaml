receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}
  resourcedetection:
    detectors: [k8s, env]
    timeout: 2s
    override: true
  resource:
    attributes:
      - key: deployment.environment
        value: production
        action: insert
  attributes:
    actions:
      - key: k8s_pod_name
        from_attribute: k8s.pod.name
        action: upsert
      - key: k8s_namespace_name
        from_attribute: k8s.namespace.name
        action: upsert
      - key: k8s_deployment_name
        from_attribute: k8s.deployment.name
        action: upsert
      - key: k8s_statefulset_name
        from_attribute: k8s.statefulset.name
        action: upsert
  # Convert resource attributes to metric attributes for Prometheus export
  resource_detection:
    detectors: [env, gke, azure, aws, system]

exporters:
  prometheus:
    endpoint: 0.0.0.0:9464
    # Include resource attributes as Prometheus labels
    # This ensures service.instance.id becomes exported_instance in Prometheus
    resource_to_telemetry_conversion:
      enabled: true

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [resourcedetection, attributes, batch, resource]
      exporters: [prometheus]
