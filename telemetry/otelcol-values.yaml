mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib

config:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
  processors:
    batch: {}
    resourcedetection:
      detectors: [k8s, env]
      timeout: 2s
      override: true
    attributes:
      actions:
        - key: k8s_pod_name
          from_attribute: k8s.pod.name
          action: upsert
        - key: k8s_namespace_name
          from_attribute: k8s.namespace.name
          action: upsert
        - key: k8s_deployment_name
          from_attribute: k8s.deployment.name
          action: upsert
        - key: k8s_statefulset_name
          from_attribute: k8s.statefulset.name
          action: upsert
    resource:
      attributes:
        - key: deployment.environment
          value: production
          action: insert
  exporters:
    prometheus:
      endpoint: 0.0.0.0:9464
  service:
    pipelines:
      metrics:
        receivers: [otlp]
        processors: [resourcedetection, attributes, batch, resource]
        exporters: [prometheus]

ports:
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  prom-metrics:
    enabled: true
    containerPort: 9464
    servicePort: 9464
    protocol: TCP

serviceMonitor:
  enabled: true
  metricsEndpoints:
    - port: prom-metrics
      interval: 30s
      scrapeTimeout: 10s
  extraLabels:
    release: monitoring-stack